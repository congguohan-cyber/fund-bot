# GitHub Actions: 每日基金分析定时任务
# 北京时间每个交易日早上 6:57 执行 (UTC 22:57)
name: 每日基金分析

on:
  schedule:
    - cron: '57 22 * * 0-4'    # 北京时间周一~周五 6:57
    - cron: '57 23 * * 0-4'    # 北京时间周一~周五 7:57 (夏令时备选)
  workflow_dispatch:
    inputs:
      force:
        description: '强制执行（跳过交易日检查）'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: fund-bot/requirements.txt

      - name: 安装系统依赖
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libcurl4-openssl-dev 2>/dev/null || true

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r fund-bot/requirements.txt
          echo "=== 依赖安装完成 ==="

      - name: 运行每日分析
        working-directory: fund-bot
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FORCE_ANALYSIS: ${{ github.event.inputs.force || 'false' }}
        run: |
          echo "=== 开始分析 ==="
          echo "PYTHONPATH=."
          mkdir -p data
          python -u -c "
          import os, sys, traceback
          sys.path.insert(0, '.')
          print(f'CWD: {os.getcwd()}')
          print(f'Python: {sys.version}')
          try:
              from database import init_database
              init_database()
              print('DB OK')
              from orchestrator import orchestrator
              force = os.environ.get('FORCE_ANALYSIS', 'false').lower() == 'true'
              print(f'Force: {force}')
              report = orchestrator.run_daily_analysis(force=force)
              if report:
                  print('=== 分析成功 ===')
              else:
                  print('=== 跳过（非交易日或已分析）===')
          except Exception:
              traceback.print_exc()
              sys.exit(1)
          "
          echo "Exit code: $?"

      - name: 完成
        if: always()
        run: echo "工作流结束"
